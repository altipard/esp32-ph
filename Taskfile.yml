# Taskfile for esp32-ph — build, run, test and release the sensor flasher.
# Requires: https://taskfile.dev  (brew install go-task)
version: "3"

vars:
  APP: esp32-ph
  APP_ID: org.petriheil.sensorflasher
  APP_NAME: "Petri-Heil Sensor-Einrichtung"
  DIST: dist
  # Version from the latest git tag, else short SHA, else "dev".
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  LDFLAGS: -s -w -X main.version={{.VERSION}}
  # esptool/fyne helpers run via `go run` so nothing extra needs installing.
  FYNE: go run fyne.io/fyne/v2/cmd/fyne
  FYNE_CROSS: go run github.com/fyne-io/fyne-cross

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  deps:
    desc: Download Go module dependencies
    cmds:
      - go mod download

  tidy:
    desc: Tidy go.mod / go.sum
    cmds:
      - go mod tidy

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  check:
    desc: deps + vet + test (run before committing/releasing)
    deps: [deps]
    cmds:
      - task: vet
      - task: test

  run:
    desc: Run the GUI locally
    cmds:
      - go run -ldflags "{{.LDFLAGS}}" .

  build:
    desc: Build a native binary into dist/
    deps: [deps]
    cmds:
      - mkdir -p {{.DIST}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.DIST}}/{{.APP}} .
    generates:
      - "{{.DIST}}/{{.APP}}"

  package:darwin:
    desc: Package a native macOS .app (+ zip) into dist/
    deps: [check]
    preconditions:
      - sh: test -f Icon.png
        msg: "Icon.png fehlt im Projekt-Root (fyne package braucht ein 1024x1024 PNG)."
    cmds:
      - mkdir -p {{.DIST}}
      - "{{.FYNE}} package -os darwin --name '{{.APP_NAME}}' --app-id {{.APP_ID}} --app-version {{.VERSION}} --icon Icon.png --release"
      - 'ditto -c -k --keepParent "{{.APP_NAME}}.app" {{.DIST}}/{{.APP}}-{{.VERSION}}-macos.zip'
      - 'rm -rf "{{.APP_NAME}}.app"'

  package:windows:
    desc: Cross-build a Windows .exe via fyne-cross (needs Docker)
    deps: [check]
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "Docker laeuft nicht — fyne-cross braucht Docker."
      - sh: test -f Icon.png
        msg: "Icon.png fehlt im Projekt-Root."
    cmds:
      - "{{.FYNE_CROSS}} windows -arch amd64 --app-id {{.APP_ID}} --name {{.APP}} --icon Icon.png"
      - mkdir -p {{.DIST}}
      - cp fyne-cross/dist/windows-amd64/*.zip {{.DIST}}/{{.APP}}-{{.VERSION}}-windows-amd64.zip

  package:linux:
    desc: Cross-build a Linux binary via fyne-cross (needs Docker)
    deps: [check]
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "Docker laeuft nicht — fyne-cross braucht Docker."
      - sh: test -f Icon.png
        msg: "Icon.png fehlt im Projekt-Root."
    cmds:
      - "{{.FYNE_CROSS}} linux -arch amd64 --app-id {{.APP_ID}} --name {{.APP}} --icon Icon.png"
      - mkdir -p {{.DIST}}
      - cp fyne-cross/dist/linux-amd64/*.tar.xz {{.DIST}}/{{.APP}}-{{.VERSION}}-linux-amd64.tar.xz

  package:all:
    desc: Package macOS + Windows + Linux into dist/
    cmds:
      - task: package:darwin
      - task: package:windows
      - task: package:linux

  release:
    desc: 'Create a GitHub release from the current tag and upload dist/* (VERSION={{.VERSION}})'
    deps: [package:all]
    preconditions:
      - sh: gh auth status >/dev/null 2>&1
        msg: "gh nicht eingeloggt — 'gh auth login' ausfuehren."
      - sh: 'echo "{{.VERSION}}" | grep -qE "^v[0-9]"'
        msg: "Kein sauberer Versions-Tag. Erst taggen: git tag vX.Y.Z && git push --tags"
    cmds:
      - gh release create {{.VERSION}} {{.DIST}}/* --title "{{.APP}} {{.VERSION}}" --generate-notes

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.DIST}} fyne-cross "{{.APP_NAME}}.app"
